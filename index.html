<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GLB Screenshot Exporter</title>

  <!-- Import map: keep this pattern. -->
  <script type="importmap">
  {
    "imports": {
      "three": "./three/build/three.module.js",
      "three/addons/": "./three/examples/jsm/"
    }
  }
  </script>

  <style>
    :root { --bg:#0b0f1a; --panel:#111a2e; --muted:#8aa0c7; --text:#e7f0ff; --accent:#6ae2ff; }
    *{ box-sizing:border-box; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    body{ margin:0; background: radial-gradient(1200px 600px at 20% 10%, #16244a 0%, var(--bg) 60%); color:var(--text); }
    header{ padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.08); display:flex; gap:12px; align-items:center; }
    header h1{ font-size:14px; margin:0; letter-spacing:0.3px; }
    header .hint{ color:var(--muted); font-size:12px; margin-left:auto; }
    main{ display:grid; grid-template-columns: 420px 1fr; gap:12px; padding:12px; height: calc(100vh - 52px); }
    .panel{ background: rgba(17,26,46,0.72); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:12px; backdrop-filter: blur(8px); }
    .panel.scroll{ overflow:auto; }
    .row{ display:flex; gap:10px; align-items:center; margin:10px 0; flex-wrap:wrap; }
    label{ font-size:12px; color:var(--muted); display:block; }
    input[type="file"]{ width:100%; padding:10px; border-radius:10px; border:1px dashed rgba(255,255,255,0.18); background: rgba(0,0,0,0.2); color:var(--text); }
    input[type="range"], select, input[type="number"], input[type="text"]{ width:100%; }
    select, input[type="number"], input[type="text"]{
      padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.25); color:var(--text);
    }
    input[type="range"]{ accent-color: var(--accent); }
    button{
      cursor:pointer; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(106,226,255,0.18), rgba(106,226,255,0.08));
      color:var(--text); font-weight:600;
    }
    button.secondary{
      background: rgba(0,0,0,0.18);
      border:1px solid rgba(255,255,255,0.12);
      font-weight:600;
    }
    button:disabled{ opacity:0.5; cursor:not-allowed; }
    .small{ font-size:12px; color:var(--muted); }
    .kv{ display:grid; grid-template-columns: 120px 1fr; gap:8px; margin-top:10px; }
    .kv div{ font-size:12px; }
    .log{ height:140px; overflow:auto; white-space:pre-wrap; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:11px; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.25); }

    #view{ position:relative; overflow:hidden; border-radius:14px; padding:0; }
    canvas{ width:100%; height:100%; display:block; }
    .badge{
      position:absolute; top:10px; left:10px; padding:8px 10px; border-radius:999px;
      background: rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.12); font-size:12px; color:var(--text);
    }

    /* POI overlay */
    #poiOverlay{ position:absolute; inset:0; pointer-events:none; display:none; }
    #poiTitle{
      position:absolute; top:14px; left:50%; transform:translateX(-50%);
      background: rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.14);
      padding:10px 12px; border-radius:12px; font-size:12px; pointer-events:none;
    }
    #poiButtons{
      position:absolute; right:14px; bottom:14px;
      display:flex; gap:10px; pointer-events:auto;
    }

    /* Objects list */
    .sectionTitle{ margin-top:14px; font-size:12px; letter-spacing:0.3px; color:var(--text); opacity:0.9; }
    .subtleHr{ height:1px; background:rgba(255,255,255,0.08); margin:12px 0; }
    .list{ margin-top:8px; display:flex; flex-direction:column; gap:6px; }
    .itemRow{
      display:grid;
      grid-template-columns: 1fr 34px 34px;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      border-radius:12px;
    }
    .itemRow .name{
      font-size:12px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .iconBtn{
      width:34px; height:34px;
      display:flex; align-items:center; justify-content:center;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.20);
      cursor:pointer;
      user-select:none;
    }
    .iconBtn.off{ opacity:0.45; }
    .poiRow{
      display:grid;
      grid-template-columns: 1fr 34px;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      border-radius:12px;
      cursor:pointer;
    }
    .poiRow .name{ font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>
  <header>
    <h1>GLB Screenshot Exporter</h1>
    <div class="hint">Uses import map + local <code>/three</code> folder. HDRIs load per-session (folder/zip).</div>
  </header>

  <main>
    <section class="panel scroll" id="leftPanel">
      <label>Load GLB</label>
      <input id="file" type="file" accept=".glb,.gltf" />

      <div class="row" style="margin-top:14px;">
        <div style="flex:1">
          <label>Export count</label>
          <select id="count">
            <option value="12">12</option>
            <option value="15" selected>15</option>
            <option value="18">18</option>
          </select>
        </div>
        <div style="flex:1">
          <label>Image size</label>
          <select id="imgSize">
            <option value="512">512</option>
            <option value="1024">1024</option>
            <option value="2048" selected>2048</option>
            <option value="4096">4096</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div style="flex:1">
          <label>Frame padding (%)</label>
          <input id="pad" type="range" min="5" max="40" value="5"/>
          <div class="small"><span id="padVal">5</span>% extra space around model.</div>
        </div>
      </div>

      <div class="row">
        <div style="flex:1">
          <label>Background</label>
          <select id="bg">
            <option value="white">White</option>
            <option value="lightgray">Light gray</option>
            <option value="darkgray">Dark gray</option>
            <option value="transparent" selected>Transparent</option>
          </select>
        </div>
        <div style="flex:1">
          <label>Lighting</label>
          <select id="light">
            <option value="studio" selected>Studio soft</option>
            <option value="hard">Hard key</option>
            <option value="rim">Rim highlight</option>
          </select>
        </div>
      </div>

      <div class="subtleHr"></div>

      <div class="sectionTitle">HDRIs (session-based)</div>
      <div class="row">
        <button id="hdriLoadFolder" type="button">Load HDRI Folder</button>
        <button id="hdriLoadZip" type="button" class="secondary">Load HDRI ZIP</button>
        <button id="hdriClear" type="button" class="secondary">Clear</button>
      </div>

      <label>HDRI Environment</label>
      <select id="hdriSelect">
        <option value="">(none)</option>
      </select>
      <div class="small" style="margin-top:6px;">
        <span id="hdriStatus">No HDRIs loaded.</span>
      </div>

      <div class="row" style="margin-top:8px;">
        <label style="display:flex;gap:8px;align-items:center; flex: 1;">
          <input id="hdriUseAsBg" type="checkbox" />
          <span class="small">Use HDRI as background</span>
        </label>
      </div>

      <div class="row" style="margin-top:6px;">
        <div style="flex:1">
          <label>Cycle HDRIs during export</label>
          <label style="display:flex;gap:8px;align-items:center;margin-top:6px;">
            <input id="exportCycleHdris" type="checkbox" checked />
            <span class="small">Enabled</span>
          </label>
        </div>
        <div style="flex:1">
          <label>Shots per HDRI</label>
          <input id="shotsPerHdri" type="number" min="1" max="99" value="1"/>
        </div>
      </div>

      <div class="subtleHr"></div>

      <div class="sectionTitle">Helix light</div>
      <div class="row">
        <label style="display:flex;gap:8px;align-items:center; flex: 1;">
          <input id="helixEnabled" type="checkbox" checked />
          <span class="small">Enable helix light during export</span>
        </label>
      </div>

      <label>Intensity</label>
      <input id="helixIntensity" type="range" min="0" max="60" value="55"/>
      <div class="small"><span id="helixIntensityVal">55</span></div>

      <label style="margin-top:8px;">Turns</label>
      <input id="helixTurns" type="range" min="0.25" max="3.0" step="0.05" value="1.5"/>
      <div class="small"><span id="helixTurnsVal">1.50</span> turns</div>

      <div class="subtleHr"></div>

      <div class="row">
        <button id="export" disabled>Export ZIP</button>
        <button id="reset" disabled class="secondary">Reset view</button>
      </div>

      <div class="kv">
        <div class="small">File</div><div id="fileName" class="small">—</div>
        <div class="small">Dimensions</div><div id="dims" class="small">—</div>
        <div class="small">Tris</div><div id="tris" class="small">—</div>
        <div class="small">Materials</div><div id="mats" class="small">—</div>
      </div>

      <div class="subtleHr"></div>

      <div class="sectionTitle">Objects</div>
      <input id="objFilter" type="text" placeholder="Filter objects…" disabled />
      <div id="objList" class="list"></div>

      <div class="sectionTitle" style="margin-top:12px;">Points of Interest</div>
      <div id="poiList" class="list"></div>

      <div class="subtleHr"></div>

      <label>Log</label>
      <div id="log" class="log"></div>

      <!-- hidden pickers -->
      <input id="hdriFolderInput" type="file" webkitdirectory multiple style="display:none" />
      <input id="hdriZipInput" type="file" accept=".zip" style="display:none" />
    </section>

    <section id="view" class="panel">
      <div class="badge" id="badge">No model loaded</div>

      <div id="poiOverlay">
        <div id="poiTitle">Setting POI</div>
        <div id="poiButtons">
          <button id="poiDone" type="button">Done</button>
          <button id="poiCancel" type="button" class="secondary">Cancel</button>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
